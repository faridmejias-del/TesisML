name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'ml-frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-frontend

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ml-frontend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Build React
        run: npm run build

      - name: Parchear URLs de Localhost a Producción (/api)
        run: |
          # Ejecutamos tu mismo comando grep/sed pero directamente en el runner de GitHub
          grep -ril "http://localhost:8000" build/ | xargs -r sed -i 's|http://localhost:8000||g'

      - name: Configurar SSH y Deploy con rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Añadir el host a known_hosts para evitar el prompt de confirmación
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          # Sincronizar la carpeta build al servidor
          rsync -avz --delete \
          -e "ssh -i ~/.ssh/id_rsa" \
          build/ \
          $SSH_USER@$SSH_HOST:/var/www/html/ml-frontend/build/